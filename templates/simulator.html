<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Target Device Simulator</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #idle-screen { text-align: center; color: #555; }
        #alert-screen { display: none; text-align: center; width: 90%; border: 4px solid #d32f2f; padding: 40px; background: #1a0000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { border-color: #d32f2f; box-shadow: 0 0 20px #d32f2f; } 50% { border-color: #ff7961; box-shadow: 0 0 40px #ff7961; } 100% { border-color: #d32f2f; box-shadow: 0 0 20px #d32f2f; } }
        .icon { font-size: 80px; color: #d32f2f; margin-bottom: 20px; }
        .header { font-size: 24px; font-weight: bold; color: #ff7961; margin-bottom: 20px; }
        .message { font-size: 18px; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="idle-screen">
        <h1>DEVICE STANDBY</h1>
        <p>Waiting for Cell Broadcast signal...<br>(No Wi-Fi / No Data Required)</p>
    </div>
    <div id="alert-screen">
        <div class="icon">⚠️</div>
        <div class="header" id="alert-category">SECURITY ALERT</div>
        <div class="message" id="alert-message">ALERT TEXT HERE</div>
    </div>
    <audio id="siren" loop><source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg"></audio>

    <script>
        const siren = document.getElementById('siren');
        let hasTriggered = false;

        // Poll the server every 1 second to check for an alert
        setInterval(async () => {
            if (hasTriggered) return; // Stop checking once triggered
            
            const response = await fetch('/check_alert');
            const data = await response.json();

            if (data.active === true) {
                hasTriggered = true;
                document.getElementById('idle-screen').style.display = 'none';
                document.getElementById('alert-screen').style.display = 'block';
                document.getElementById('alert-category').innerText = data.category.toUpperCase() + " THREAT";
                document.getElementById('alert-message').innerText = data.message;
                
                siren.play().catch(e => console.log("Click screen once to allow audio"));
                
                // Reset server state after 10 seconds so you can test again
                setTimeout(async () => {
                    await fetch('/reset', { method: 'POST' });
                    hasTriggered = false;
                    document.getElementById('alert-screen').style.display = 'none';
                    document.getElementById('idle-screen').style.display = 'block';
                    siren.pause();
                }, 10000);
            }
        }, 1000);
    </script>
</body>
</html>
